<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="css/style.css" />  -->
    <title>Contact</title>

    <!-- SDN -->
    <script type="text/javascript"></script>
    <!-- SDN -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!--     
    <span id="toast" class="toast-none toast-active">Feedback submitted</span>
    <span id="error" class="toast-none toast-error">Make sure no field remains empty</span> -->

    <section class="contact-section">
      <div class="main-content-section">
        <div class="contact-details">
          <div class="map-box">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14415.509986983625!2d68.24595360781252!3d25.408910899999995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x394c7bbce1d33ccb%3A0x665db353baebc310!2sNational%20Expansion%20Plan%20of%20NICs%20Jamshoro!5e0!3m2!1sen!2s!4v1668076728117!5m2!1sen!2s"
              width="100%"
              height="500px"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            >
            </iframe>
          </div>

          <div class="adress-boxes">
            <div class="adress-detail-box">
              <img
                class="adress-icon"
                src="../images/icons/mail.png"
                alt="Contact Icon"
              />
              <div class="adress-details">
                <h1>Contact No:</h1>
                <p>+92-335-299-6009</p>
              </div>
            </div>
            <div class="adress-detail-box">
              <img
                class="adress-icon"
                src="../images/icons/contact.svg"
                alt="Mail Icon"
              />
              <div class="adress-details">
                <h1>Email:</h1>
                <p>contact.dhondlo@gmail.com</p>
              </div>
            </div>

            <div class="adress-detail-box">
              <img
                class="adress-icon"
                src="../images/icons/address.png"
                alt="Address Icon"
              />
              <div class="adress-details">
                <h1>Address:</h1>
                <p>
                  Dhondlo.com Office, National Expansion Plan of NICs Jamshoro,
                  Sindh, Pakistan
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="main-content-section">
      <div class="contact-form about-details">
        <h1 class="contact-form-title">
          <span class="feedback-title">Feedback Form</span>
        </h1>
        <div class="form-field">
          <label for="name">Full Name:</label><br />
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Full Name"
            required
          />
        </div>

        <div class="form-field">
          <label for="email">Email Address:</label><br />
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Email"
            required
          />
        </div>

        <div class="message-field">
          <label for="message">Message:</label><br />
          <textarea
            name="message"
            id="message"
            placeholder="Write message here"
            required
          ></textarea>
        </div>

        <div class="submit-button">
          <button id="btn" type="submit" class="submitBtn">SUBMIT</button>
        </div>
      </div>
    </section>

    <script src="./js/script.js"></script>
  </body>
</html>
